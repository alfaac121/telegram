<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Panel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: var(--bg-main);
    }
    .login-card {
      background: var(--bg-card);
      padding: 40px;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-card h1 {
      margin-bottom: 8px;
    }
    .login-card p {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.85rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      font-family: inherit;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--primary-blue);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--primary-blue);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .error-msg {
      color: var(--color-red);
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-box" style="color:var(--primary-blue); margin-bottom: 20px;">
      LOGO<span style="font-size:0.5em; opacity:0.7;">AUTH</span>
    </div>
    <h1>Iniciar Sesión</h1>
    <p>Acceso seguro al sistema de reportes</p>

    <form id="loginForm">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" required placeholder="admin@admin.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" required placeholder="******">
      </div>
      <button type="submit" class="btn-login" id="btnSubmit">Entrar al Panel</button>
      <div class="error-msg" id="errorMsg">Credenciales inválidas</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnSubmit');
      const err = document.getElementById('errorMsg');
      
      btn.textContent = 'Cargando...';
      btn.disabled = true;
      err.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.usuario));
          window.location.href = '/index.html';
        } else {
          err.textContent = data.error || 'Error de acceso';
          err.style.display = 'block';
        }
      } catch (error) {
        err.textContent = 'Error de red';
        err.style.display = 'block';
      } finally {
        btn.textContent = 'Entrar al Panel';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
